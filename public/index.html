<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Socket.IO</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section id="registerPanel" class="panel register-panel">
        <h1>Chat</h1>
        <form id="registerForm" class="form">
          <label for="nameInput">Nombre de usuario</label>
          <div class="inline-form">
            <input id="nameInput" name="name" type="text" maxlength="80" autocomplete="name" required>
            <button type="submit">Entrar</button>
          </div>
          <p id="registerError" class="error" role="alert"></p>
        </form>
      </section>

      <section id="chatPanel" class="panel chat-panel" hidden>
        <header class="chat-header">
          <div>
            <span class="label">Usuario</span>
            <strong id="currentUser"></strong>
          </div>
          <nav class="header-links">
            <a href="/api/chats" target="_blank" rel="noreferrer">GET chats</a>
            <a href="/api/connected-users" target="_blank" rel="noreferrer">Conectados</a>
          </nav>
        </header>

        <div class="chat-body">
          <aside class="connected">
            <span class="label">Conectados</span>
            <ul id="connectedUsers"></ul>
          </aside>
          <ol id="messages" class="messages"></ol>
        </div>

        <form id="messageForm" class="message-form" enctype="multipart/form-data">
          <input id="messageInput" type="text" autocomplete="off" placeholder="Escribe un mensaje">
          <input id="fileInput" type="file" accept="image/*,video/mp4,video/quicktime,video/webm">
          <button type="submit">Enviar</button>
        </form>
        <p id="messageError" class="error" role="alert"></p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
